server:
  port: 8080

spring:
  application:
    name: taskflow

  # ── Database ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/sprintly_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000



  # ── OAuth2 (Google) ───────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope: email, profile

# ── JWT Settings ──────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:taskflow-super-secret-key-change-in-production-must-be-256-bits}
  access-token-expiry-ms: 900000       # 15 minutes
  refresh-token-expiry-ms: 604800000   # 7 days

# ── SpringDoc / Swagger ───────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs
  show-actuator: false

# ── Actuator ──────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ───────────────────────────────────────────────
logging:
  level:
    com.taskflow: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
